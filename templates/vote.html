<!DOCTYPE html>
<html>
<head>
    <title>Vote</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <a href="/">🏠 Home</a>
<br><br>
    <h1>Cast Your Vote</h1>

    <form method="POST">
        <label>Enter Voter ID:</label><br>
        <input type="text" name="voter_id" required>
        <br><br>

        <input type="radio" name="candidate" value="Alice" required>
        Alice
        <br><br>

        <input type="radio" name="candidate" value="Bob">
        Bob
        <br><br>

        <input type="radio" name="candidate" value="Charlie">
        Charlie
        <br><br>

        <button type="submit">
            Submit Vote
        </button>

    </form>

</body>
</html>
